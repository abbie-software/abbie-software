<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abbie's Coffee House</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #fdf5e6; /* Creamy color */
            color: #4b3621; /* Coffee brown */
            margin: 0;
            text-align: center;
        }
        header {
            background-color: #6f4e37;
            color: white;
            padding: 2rem;
        }
        .menu {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }
        .item {
            border: 2px solid #6f4e37;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>☕ Abbie's Coffee House</h1>
        <p>The best beans in town.</p>
    </header>

    <section>
        <h2>Our Menu</h2>
        <div class="menu">
            <div class="item">
                <h3>Espresso</h3>
                <p>300ksh</p>
            </div>
            <div class="item">
                <h3>Cappuccino</h3>
                <p>450ksh</p>
            </div>
            <div class="item">
                <h3>Latte</h3>
                <p>500ksh</p>
            </div>
        </div>
    </section>

</body>
</html>
